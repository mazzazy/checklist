<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Architect Roadmap — Progress Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #252535;
    --border2: #303045;
    --p0: #818cf8;
    --p1: #34d399;
    --p2: #f87171;
    --p3: #fbbf24;
    --p4: #fb923c;
    --p5: #a78bfa;
    --text: #e2e2f0;
    --muted: #6b6b90;
    --done-bg: rgba(52,211,153,0.06);
    --done-border: rgba(52,211,153,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 48px 32px 32px;
    max-width: 860px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--p0), var(--p1), var(--p2), var(--p3), var(--p4), transparent);
    opacity: 0.5;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--p1);
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  h1 em { font-style: normal; color: var(--p0); }

  /* OVERALL PROGRESS */
  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .prog-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

  .prog-bar-wrap { flex: 1; min-width: 200px; }
  .prog-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .prog-bar-track {
    height: 6px;
    background: var(--border2);
    border-radius: 3px;
    overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--p0), var(--p1));
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* RESET BTN */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--p2); color: var(--p2); }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 32px; }

  /* PHASE BLOCK */
  .phase-block {
    margin-bottom: 48px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .phase-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .phase-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    flex: 1;
  }

  .phase-duration {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .phase-progress-mini {
    font-size: 10px;
    flex-shrink: 0;
  }

  /* SECTION */
  .section {
    margin-bottom: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .section-header:hover { background: var(--surface2); }

  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    flex: 1;
    letter-spacing: 0.3px;
  }

  .section-count {
    font-size: 10px;
    color: var(--muted);
  }

  .section-chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .section-header.open .section-chevron { transform: rotate(180deg); }

  .section-items {
    display: none;
    border-top: 1px solid var(--border);
  }

  .section-items.open { display: block; }

  /* ITEM */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 16px 13px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--surface2); }

  .item.done {
    background: var(--done-bg);
  }

  .item.done .item-title {
    text-decoration: line-through;
    opacity: 0.5;
  }

  .item.done .item-desc { opacity: 0.35; }

  /* Custom checkbox */
  .checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border2);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .item.done .checkbox {
    background: var(--p1);
    border-color: var(--p1);
  }

  .checkmark {
    display: none;
    color: #0c0c10;
    font-size: 11px;
    font-weight: bold;
  }

  .item.done .checkmark { display: block; }

  .item-body { flex: 1; min-width: 0; }

  .item-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .item-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 2px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .free { background: rgba(52,211,153,0.12); color: var(--p1); border: 1px solid rgba(52,211,153,0.25); }
  .dotnet { background: rgba(129,140,248,0.12); color: var(--p0); border: 1px solid rgba(129,140,248,0.25); }
  .project { background: rgba(251,191,36,0.12); color: var(--p3); border: 1px solid rgba(251,191,36,0.25); }
  .cert { background: rgba(167,139,250,0.12); color: var(--p5); border: 1px solid rgba(167,139,250,0.25); }
  .pluralsight-course {
        background: rgba(251,191,36,0.12);
        color: var(--p3);
        border: 1px solid rgba(251,191,36,0.25);
    }

  .item-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .item-link {
    font-size: 10px;
    color: var(--p0);
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    opacity: 0.8;
    text-decoration: none;
    border-bottom: 1px dashed rgba(129,140,248,0.35);
    transition: opacity 0.15s, border-color 0.15s;
  }
  .item-link:hover { opacity: 1; border-color: var(--p0); }
  .item-link::before { content: '↗'; font-size: 9px; }

  /* CELEBRATION */
  .celebration {
    display: none;
    position: fixed;
    top: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--p1);
    border-radius: 6px;
    padding: 14px 20px;
    font-size: 12px;
    color: var(--p1);
    z-index: 999;
    animation: slideIn 0.3s ease;
    max-width: 260px;
  }

  @keyframes slideIn {
    from { opacity:0; transform: translateX(20px); }
    to { opacity:1; transform: translateX(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div id="celebration" class="celebration"></div>

<div class="header">
  <div class="eyebrow">Senior .NET Engineer → AI Architect</div>
  <h1>Your <em>AI Architecture</em> Roadmap<br>Progress Tracker</h1>

  <div class="overall-progress">
    <div class="prog-stats">

      </div>

        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="pct-count" style="color:var(--p0)">0%</div>
        <div class="stat-label">Progress</div>
      </div>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-label">
        <span>Overall Journey</span>
        <span id="bar-label">0 / 0</span>
      </div>
      <div class="prog-bar-track">
        <div class="prog-bar-fill" id="main-bar" style="width:0%"></div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset All</button>
  </div>
</div>

<div class="main" id="main"></div>

            { title: 'Python 3: The Big Picture – Pluralsight', desc: 'When you finished with this course, you will have the skills and knowledge of Python to decide if it would be a valuable addition to you or your company skill set.', link: 'https://app.pluralsight.com/library/courses/python-3-big-picture', linkLabel: 'Python 3: The Big Picture', badge: 'pluralsight-course' },
            { title: 'Python 3 Fundamentals – Pluralsight', desc: 'When you’re finished with this course, you’ll have the skills and knowledge of Python needed to create complex Python applications to solve a variety of problems.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-fundamentals/course-overview', linkLabel: 'Python 3 Fundamentals', badge: 'pluralsight-course' },
            { title: 'Classes and Object-oriented Programming in Python 3', desc: 'you’ll have the skills and knowledge of object-oriented programming in Python needed to build enterprise level applications with the OOP paradigm in mind.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-classes-object-oriented-programming/course-overview', linkLabel: 'Classes and Object-oriented Programming in Python 3', badge: 'pluralsight-course' },

            { title: 'Working with Databases in Python 3', desc: 'When you’re finished with this course, you’ll have the skills and knowledge of relational and NoSQL databases in Python needed to use databases in your next Python application.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-working-databases/course-overview', linkLabel: 'Working with Databases in Python 3', badge: 'pluralsight-course' },
            { title: 'Python 3 Best Practices', desc: 'By the end of this course, you will be able to write clearer, more readable, and more maintainable code with better documentation.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-best-practices/course-overview', linkLabel: 'Python 3 Best Practices', badge: 'dotnet' },
            { title: 'Development Environments and Package Management in Python 3', desc: 'At the end of this course, you’ll have all the necessary skills that a Python developer will need to manage the dependencies of their projects.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-development-environments-package-management/course-overview', linkLabel: 'Development Environments and Package Management in Python 3', badge: 'pluralsight-course' },
            { title: 'Testing in Python 3', desc: 'When you’re finished with this course, you’ll have the skills and knowledge of writing the automated tests needed to ensure your code does what you think it does and has a reliable suite of regression tests to support future development.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-testing/course-overview', linkLabel: 'Testing in Python 3', badge: 'pluralsight-course' },

            { title: 'Design Patterns in Python 3', desc: 'When you’re finished with this course, you’ll have the skills and knowledge of object-oriented Python programming needed to build stable, maintainable, and extensible applications.', link: 'https://app.pluralsight.com/ilx/video-courses/python-3-design-patterns/course-overview', linkLabel: 'Design Patterns in Python 3', badge: 'pluralsight-course' },
            { title: 'Python Requests Playbook', desc: 'When you’re finished with this course, you’ll have the skills and knowledge of using the requests library needed to make HTTP requests to various HTTP compliant services.', link: 'https://app.pluralsight.com/ilx/video-courses/python-requests-playbook/course-overview', linkLabel: 'Python Requests Playbook', badge: 'pluralsight-course' },

// --- STATE ---
function getState() {
  try { return JSON.parse(localStorage.getItem('ai_roadmap_v2') || '{}'); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem('ai_roadmap_v2', JSON.stringify(s)); } catch {}
}

// --- BUILD UI ---
const main = document.getElementById('main');
let allItemIds = [];

PHASES.forEach((phase, pi) => {
  const block = document.createElement('div');
  block.className = 'phase-block';

  const phaseItems = phase.sections.flatMap(s => s.items.map((_, ii) => `${phase.id}_s${phase.sections.indexOf(s)}_i${ii}`));
  allItemIds.push(...phaseItems);

  block.innerHTML = `
    <div class="phase-header">
      <span class="phase-number" style="background:${phase.color}22; color:${phase.color}; border:1px solid ${phase.color}44">PHASE ${pi}</span>
      <span class="phase-title">${phase.title}</span>
      <span class="phase-duration">${phase.duration}</span>
      <span class="phase-progress-mini" id="pp-${phase.id}" style="color:${phase.color}">0 / ${phaseItems.length}</span>
    </div>
  `;

  phase.sections.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'section';

    const sectionItems = section.items.map((_, ii) => `${phase.id}_s${si}_i${ii}`);
    const headerId = `sh-${phase.id}-${si}`;
    const bodyId = `sb-${phase.id}-${si}`;

    sec.innerHTML = `
      <div class="section-header" id="${headerId}" onclick="toggleSection('${bodyId}','${headerId}')">
        <div class="section-dot" style="background:${phase.color}"></div>
        <span class="section-name">${section.name}</span>
        <span class="section-count" id="sc-${phase.id}-${si}">0 / ${section.items.length} done</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-items open" id="${bodyId}">
        ${section.items.map((item, ii) => {
          const itemId = `${phase.id}_s${si}_i${ii}`;
          const badge = item.badge === 'free' ? '<span class="badge free">FREE</span>'
            : item.badge === 'dotnet' ? '<span class="badge dotnet">.NET BRIDGE</span>'
            : item.badge === 'pluralsight-course' ? '<span class="badge pluralsight-course">PLURALSIGHT COURSE</span>'
            : item.badge === 'project' ? '<span class="badge project">PROJECT</span>'
            : item.badge === 'cert' ? '<span class="badge cert">CERT</span>' : '';
          return `
            <div class="item" id="item-${itemId}" onclick="toggleItem('${itemId}')">
              <div class="checkbox"><span class="checkmark">✓</span></div>
              <div class="item-body">
                <div class="item-top">
                  <span class="item-title">${item.title}</span>
                  ${badge}
                </div>
                <div class="item-desc">${item.desc}</div>
                ${item.link ? `<a class="item-link" href="${item.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${item.linkLabel || item.link}</a>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    block.appendChild(sec);
  });

  main.appendChild(block);
});

document.getElementById('total-count').textContent = allItemIds.length;
document.getElementById('bar-label').textContent = `0 / ${allItemIds.length}`;

// --- TOGGLE SECTION ---
function toggleSection(bodyId, headerId) {
  const body = document.getElementById(bodyId);
  const header = document.getElementById(headerId);
  body.classList.toggle('open');
  header.classList.toggle('open');
}

// --- TOGGLE ITEM ---
function toggleItem(itemId) {
  const state = getState();
  state[itemId] = !state[itemId];
  saveState(state);
  applyState();

  if (state[itemId]) celebrate(itemId);
}

function applyState() {
  const state = getState();
  let done = 0;

  allItemIds.forEach(id => {
    const el = document.getElementById(`item-${id}`);
    if (!el) return;
    if (state[id]) { el.classList.add('done'); done++; }
    else el.classList.remove('done');
  });

  // Update phase counters
  PHASES.forEach((phase, pi) => {
    let pDone = 0, pTotal = 0;
    phase.sections.forEach((section, si) => {
      let sDone = 0;
      section.items.forEach((_, ii) => {
        const id = `${phase.id}_s${si}_i${ii}`;
        pTotal++;
        if (state[id]) { sDone++; pDone++; }
      });
      const sc = document.getElementById(`sc-${phase.id}-${si}`);
      if (sc) sc.textContent = `${sDone} / ${section.items.length} done`;
    });
    const pp = document.getElementById(`pp-${phase.id}`);
    if (pp) pp.textContent = `${pDone} / ${pTotal}`;
  });

  // Overall
  document.getElementById('done-count').textContent = done;
  const pct = Math.round((done / allItemIds.length) * 100);
  document.getElementById('pct-count').textContent = pct + '%';
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('bar-label').textContent = `${done} / ${allItemIds.length}`;
}

// --- CELEBRATE ---
const messages = [
  '✓ Locked in. Keep going.', '⚡ One step closer to AI Architect.', '🎯 Progress saved.',
  '🔥 Your C# background + this = unstoppable.', '✓ Done. What\'s next?',
  '💪 15 years of .NET + AI skills loading...', '🚀 Another item down.',
];
function celebrate(id) {
  const el = document.getElementById('celebration');
  el.textContent = messages[Math.floor(Math.random() * messages.length)];
  el.style.display = 'block';
  clearTimeout(window._ct);
  window._ct = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// --- RESET ---
function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem('ai_roadmap_v2');
  applyState();
}

// --- INIT ---
applyState();
</script>
